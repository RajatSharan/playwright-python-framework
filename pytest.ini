[pytest]
addopts =
    --strict-markers
    --tracing=retain-on-failure
    --screenshot=only-on-failure
    --output=test-results
    --alluredir=allure-results
    --reruns=2
    --reruns-delay=1

testpaths = tests

markers =
    smoke: Smoke test cases — run on every deployment
    regression: Regression test cases — run before releases
    e2e: End-to-end workflow tests
    api: API-level tests
    slow: Tests that take longer than 10s

log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S